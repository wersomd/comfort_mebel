<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Коллекции — минимализм</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, sans-serif; background: #F8F3EE; padding: 32px; }

  .page-section { background: white; padding: 32px; max-width: 900px; margin: 0 auto; }

  .section-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title { font-family: Georgia, serif; font-size: 32px; color: #3D2C25; font-weight: 500; }
  .section-link { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #9A8070; border-bottom: 1px solid #E8D9C6; padding-bottom: 2px; cursor: pointer; }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .cat-card {
    background: #fff;
    border: 1px solid #EEE8E0;
    cursor: pointer;
    transition: box-shadow 0.25s, transform 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 20px 16px 18px;
    min-height: 220px;
    position: relative;
    overflow: hidden;
  }
  .cat-card:hover {
    box-shadow: 0 8px 32px rgba(61,44,37,0.10);
    transform: translateY(-3px);
  }

  /* PNG photo floats in the middle */
  .cat-photo {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 48px;
    display: flex; align-items: center; justify-content: center;
  }
  .cat-photo img {
    max-width: 85%;
    max-height: 150px;
    object-fit: contain;
    filter: drop-shadow(0 12px 20px rgba(61,44,37,0.18));
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .cat-card:hover .cat-photo img {
    transform: translateY(-6px) scale(1.04);
  }

  /* Real photo from unsplash - simulating transparent PNG look */
  .cat-photo-sim {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 48px;
    display: flex; align-items: center; justify-content: center;
  }
  .cat-photo-sim img {
    max-width: 90%;
    max-height: 155px;
    object-fit: contain;
    mix-blend-mode: multiply; /* simulates transparent background on white */
    filter: drop-shadow(0 10px 18px rgba(61,44,37,0.14));
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .cat-card:hover .cat-photo-sim img {
    transform: translateY(-6px) scale(1.04);
  }

  .cat-info {
    position: relative; z-index: 2;
    width: 100%;
    border-top: 1px solid #F0EAE0;
    padding-top: 12px;
    margin-top: auto;
    align-self: flex-end;
  }
  .cat-name {
    font-family: Georgia, serif;
    font-size: 15px;
    color: #3D2C25;
    font-weight: 600;
  }
  .cat-arrow {
    position: absolute; right: 0; top: 14px;
    font-size: 12px; color: #C4A07A;
  }
</style>
</head>
<body>

<div class="page-section">
  <div class="section-header">
    <span class="section-title">Коллекции</span>
    <span class="section-link">Все категории</span>
  </div>

  <div class="grid">
    <div class="cat-card">
      <div class="cat-photo-sim">
        <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500&q=80&fm=jpg" alt="Диваны" />
      </div>
      <div class="cat-info">
        <div class="cat-name">Диваны</div>
        <div class="cat-arrow">→</div>
      </div>
    </div>

    <div class="cat-card">
      <div class="cat-photo-sim">
        <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500&q=80" alt="Кресла" />
      </div>
      <div class="cat-info">
        <div class="cat-name">Кресла</div>
        <div class="cat-arrow">→</div>
      </div>
    </div>

    <div class="cat-card">
      <div class="cat-photo-sim">
        <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500&q=80" alt="Кровати" />
      </div>
      <div class="cat-info">
        <div class="cat-name">Кровати</div>
        <div class="cat-arrow">→</div>
      </div>
    </div>

    <div class="cat-card">
      <div class="cat-photo-sim">
        <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500&q=80" alt="Шкафы" />
      </div>
      <div class="cat-info">
        <div class="cat-name">Шкафы</div>
        <div class="cat-arrow">→</div>
      </div>
    </div>
  </div>
</div>

<p style="text-align:center; margin-top:16px; font-size:11px; color:#9A8070; letter-spacing:1px;">
  Реальные фото будут PNG без белого фона — тогда эффект будет ещё чище
</p>

</body>
</html>
